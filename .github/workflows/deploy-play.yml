name: Deploy to Google Play

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Infisical CLI
        run: |
          set -o pipefail
          curl -1sLf 'https://artifacts-cli.infisical.com/setup.deb.sh' | sudo -E bash
          sudo apt-get update
          sudo apt-get install -y infisical
          infisical --version

      - name: Publish to Google Play
        run: infisical run --projectId="$INFISICAL_PROJECT_ID" --env=system_env -- ./gradlew publishRelease
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
          INFISICAL_PROJECT_ID: ${{ vars.INFISICAL_PROJECT_ID }}
          INFISICAL_API_URL: https://eu.infisical.com
          INFISICAL_SKIP: "1"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-release
          path: androidApp/build/outputs/bundle/release/app-release.aab
